<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Aula 04</title>
    <meta charset="utf-8">
</head>

<body>
    <h1>
        Cadastro
    </h1>
    <form>
        Login: <br>
        <input type="text" name="login"> <br>
        Senha: <br>
        <input type="password" name="senha"> <br>
        Confirmar senha: <br>
        <input type="password" name="confirmar_senha"><br>
        Nome: <br>
        <input type="text" name="nome"><br>

        Sexo: <br>
        <input type="radio" name="masculino" name="sexo">Masculino <br>
        <input type="radio" name="feminino" name="sexo">Feminino <br>

        Email: <br>
        <input type="text" name="email"><br>
        <input type="checkbox" value="futebol" name="interesses">Futebol <br>
        <input type="checkbox" value="politica" name="interesses">Política <br>
        <input type="checkbox" value="economia" name="interesses">Economia <br>
        <input type="checkbox" value="carros" name="interesses">Carros <br>
        <input type="checkbox" value="celebridades" name="interesses">Celebridades <br><br>

        <label for="esatdos">Estado:</label><br>

        <select name="estados">
            <option value="piaui">Piauí</option>
            <option value="ceara">Ceará</option>
            <option value="bahia">Bahia</option>
            <option value="rgn">Rio Grande do Norte</option>
        </select>
        <br>
        <label for="w3review">Observações:</label><br>

        <textarea name="observacoes" rows="4" cols="50">.
</textarea>

        <br><br>
        <input type="button" name="Enviar" value="Enviar">

    </form>

</body>

</html>

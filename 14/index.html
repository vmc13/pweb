<!DOCTYPE html>
<html>

<head>
    <title>Atividade 14</title>
    <meta charset="utf-8" />
    <style type="text/css">
        .box {
            background: linear-gradient(to top left, yellow,red);
            width: 300px;
            height: 300px;
            margin: 50px;
            box-sizing: border-box;
            box-shadow: 10px 10px 5px #888888;
        }
        .box h1 {
            background: rgb(255, 255, 255, 0.5);
            text-shadow: 3px 3px 3px orange;
        }

        .box-linear {
            width: 300px;
            height: 300px;
            margin: 50px;
            background: linear-gradient(to top right, cyan, magenta, lime, red);
        }

        .box-radial {
            width: 600px;
            height: 150px;
            margin: 50px;
            background: radial-gradient(ellipse, red, yellow, green);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Lorem Ipsum?</h1>
        <p>
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Curabitur sollicitudin quam non odio luctus volutpat. Donec fringilla scelerisque mattis. Suspendisse placerat ipsum in nisl volutpat, non tempor tellus placerat.
        </p>
    </div>

    <div class="box-linear"></div>

    <div class="box-radial"></div>
</body>
</html>
